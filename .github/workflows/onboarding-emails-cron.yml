name: Onboarding Emails Cron

on:
  schedule:
    # Daily at 08:00 UTC (matches the in-process APScheduler schedule)
    - cron: "0 8 * * *"
  workflow_dispatch: {}

concurrency:
  group: onboarding-emails-cron
  cancel-in-progress: false

jobs:
  send:
    name: Trigger onboarding email batch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /admin/onboarding-emails
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          API_URL: https://web-production-34028.up.railway.app
        run: |
          if [ -z "$ADMIN_API_KEY" ]; then
            echo "::error::ADMIN_API_KEY secret is not configured on this repository."
            exit 1
          fi

          echo "Calling $API_URL/admin/onboarding-emails ..."

          response=$(curl -sS -w "\n__HTTP_STATUS__:%{http_code}" \
            -X POST "$API_URL/admin/onboarding-emails" \
            -H "X-Admin-Key: $ADMIN_API_KEY" \
            --max-time 240)

          body=$(echo "$response" | sed -e 's/__HTTP_STATUS__:.*//')
          status=$(echo "$response" | tr -d '\n' | sed -e 's/.*__HTTP_STATUS__://')

          echo "HTTP status: $status"
          echo "Response body:"
          echo "$body"

          if [ "$status" != "200" ]; then
            echo "::error::Non-200 response ($status) from /admin/onboarding-emails"
            exit 1
          fi
